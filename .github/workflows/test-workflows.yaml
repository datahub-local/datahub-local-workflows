name: Test Workflows

on:
  pull_request:
    paths:
      - ".github/workflows/test-workflows.yaml"
      - "workflows/airflow/**"
      - "workflows/sqlmesh/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-workflows.yaml"
      - "workflows/airflow/**"
      - "workflows/sqlmesh/**"

permissions:
  contents: read

concurrency:
  group: test-workflows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  airflow:
    name: Airflow tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/airflow
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python with uv
        working-directory: workflows/airflow
        run: uv python install 3.11

      - name: Sync dependencies
        working-directory: workflows/airflow
        run: uv sync

      - name: Run Airflow tests
        working-directory: workflows/airflow
        run: uv run -- pytest

  sqlmesh:
    name: SQLMesh tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/sqlmesh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Spark/Ivy JARs
        uses: actions/cache@v4
        with:
          path: ~/.ivy2
          key: spark-ivy-${{ hashFiles('workflows/sqlmesh/pipelines/**/config.yaml') }}
          restore-keys: spark-ivy-

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python with uv
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run -- pytest tests/ --ignore=tests/example_db/test_integration.py

      - name: Run integration tests
        run: uv run -- pytest tests/example_db/test_integration.py -v
