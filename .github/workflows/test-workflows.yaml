name: Test Workflows

on:
  pull_request:
    paths:
      - ".github/workflows/test-workflows.yaml"
      - "workflows/airflow/**"
      - "workflows/dbt/**"
      - "workflows/dlt/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-workflows.yaml"
      - "workflows/airflow/**"
      - "workflows/dbt/**"
      - "workflows/dlt/**"

permissions:
  contents: read

concurrency:
  group: test-workflows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  airflow:
    name: Airflow tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/airflow
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python with uv
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: Run Airflow tests
        run: uv run -- pytest

  dbt:
    name: dbt tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/dbt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python with uv
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run -- pytest tests/ --ignore=tests/example_db/test_integration.py

      - name: Run integration tests (DuckDB)
        run: uv run -- pytest tests/example_db/test_integration.py -v

  dlt:
    name: dlt tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/dlt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python with uv
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests (DuckDB)
        run: uv run -- pytest
