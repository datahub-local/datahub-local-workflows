name: Test Workflows

on:
  pull_request:
    paths:
      - ".github/workflows/test-workflows.yaml"
      - "workflows/airflow/**"
      - "workflows/spark-apps/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-workflows.yaml"
      - "workflows/airflow/**"
      - "workflows/spark-apps/**"

permissions:
  contents: read

concurrency:
  group: test-workflows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  airflow:
    name: Airflow tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/airflow
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: workflows/airflow/uv.lock

      - name: Install Python with uv
        working-directory: workflows/airflow
        run: uv python install 3.11

      - name: Sync dependencies
        working-directory: workflows/airflow
        run: uv sync

      - name: Run Airflow tests
        working-directory: workflows/airflow
        run: uv run -- python run_tests.py

  spark_apps:
    name: Spark chart tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3

      - name: Run Helm unit tests
        run: cd workflows/spark && helm dependency build && helm template .
