name: Test Workflows

on:
  pull_request:
    paths:
      - ".github/workflows/test-workflows.yaml"
      - "workflows/airflow/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-workflows.yaml"
      - "workflows/airflow/**"

permissions:
  contents: read

concurrency:
  group: test-workflows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  airflow:
    name: Airflow tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/airflow
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python with uv
        working-directory: workflows/airflow
        run: uv python install 3.11

      - name: Sync dependencies
        working-directory: workflows/airflow
        run: uv sync

      - name: Run Airflow tests
        working-directory: workflows/airflow
        run: uv run -- pytest
