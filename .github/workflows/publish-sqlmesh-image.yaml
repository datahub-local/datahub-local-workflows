name: Publish SQLMesh Image

on:
  push:
    branches: [main]
    paths:
      - workflows/sqlmesh/**
  pull_request:
    paths:
      - workflows/sqlmesh/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: workflows/sqlmesh
        run: pip install -e ".[dev]"

      - name: Validate SQLMesh projects (dry-run plan)
        working-directory: workflows/sqlmesh
        env:
          EXAMPLE_DB_URL: "jdbc:h2:mem:testdb"
          EXAMPLE_DB_USER: user
          EXAMPLE_DB_PASSWORD: ""
        run: |
          sqlmesh --project example_db plan --no-prompts --auto-apply --skip-tests 2>&1 | head -50 || true
          sqlmesh --project pi plan --no-prompts --auto-apply --skip-tests 2>&1 | head -50 || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: workflows/sqlmesh
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/datahub-local/datahub-local-workflows-sqlmesh:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
