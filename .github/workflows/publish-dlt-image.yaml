name: Publish dlt Image

on:
  workflow_run:
    workflows: [Test Workflows]
    types: [completed]
    branches: [main]

jobs:
  changes:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      dlt: ${{ steps.filter.outputs.dlt }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - name: Check for dlt changes
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^workflows/dlt/"; then
            echo "dlt=true" >> $GITHUB_OUTPUT
          else
            echo "dlt=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: changes
    if: needs.changes.outputs.dlt == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: workflows/dlt
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/datahub-local/datahub-local-workflows-dlt:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
