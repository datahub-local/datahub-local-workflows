name: Publish Spark Bundle

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-spark-bundle.yaml"
      - "workflows/spark/Dockerfile.bundle"
      - "workflows/spark/pyproject.toml"
      - "workflows/spark/src/**"
      - "workflows/spark/tools/**"
      - "workflows/spark/uv.lock"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-spark-bundle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/datahub-local-workflows-spark-bundle

jobs:
  publish:
    name: Publish Spark OCI bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/spark
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: workflows/spark/uv.lock

      - name: Install Python with uv
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build runtime bundle
        run: sh tools/build_bundle.sh ${{ env.PYTHON_VERSION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Spark bundle image
        uses: docker/build-push-action@v6
        with:
          context: workflows/spark
          file: workflows/spark/Dockerfile.bundle
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
