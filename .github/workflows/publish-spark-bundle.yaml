name: Publish Spark Bundle

on:
  pull_request:
    paths:
      - ".github/workflows/publish-spark-bundle.yaml"
      - "workflows/spark/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-spark-bundle.yaml"
      - "workflows/spark/**"

permissions:
  contents: read

concurrency:
  group: publish-spark-bundle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/datahub-local-workflows-spark-bundle

jobs:
  spark:
    name: Spark checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/spark
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: workflows/spark/uv.lock

      - name: Install Python with uv
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync Spark dependencies
        run: uv sync --python ${{ env.PYTHON_VERSION }} --group dev

      - name: Run Spark tests
        run: uv run --python ${{ env.PYTHON_VERSION }} pytest

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1

      - name: Install Helmfile
        working-directory: workflows/spark/deploy
        run: |
          HELMFILE_VERSION=1.4.4
          curl -fsSL "https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz helmfile
          sudo install helmfile /usr/local/bin/helmfile
          helmfile version

      - name: Run Helmfile checks
        working-directory: workflows/spark/deploy
        run: |
          helmfile template

  publish:
    name: Publish Spark OCI bundle
    runs-on: ubuntu-latest
    needs: spark
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: workflows/spark
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Spark bundle image
        uses: docker/build-push-action@v6
        with:
          context: workflows/spark
          file: workflows/spark/Dockerfile.bundle
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
