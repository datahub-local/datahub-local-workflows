namespaceOverride: spark-apps

imagePullSecrets:
  - name: regcred

serviceAccount:
  create: false
  name: spark

scripts:
  enabled: true
  mountPath: /opt/spark/scripts

sharedConfigMaps:
  - enabled: true
    id: common-env
    name: spark-shared-config
    envFrom: true
    mountPath: /opt/spark/conf/app
    data:
      APP_ENV: dev
      SPARK_LOG_LEVEL: INFO
  - enabled: true
    id: metrics-config
    name: spark-metrics-config
    envFrom: true
    data:
      METRICS_NAMESPACE: spark-dev

sharedSecrets:
  - enabled: true
    id: api-token
    name: spark-shared-secret
    envFrom: true
    stringData:
      API_TOKEN: replace-me
  - enabled: true
    id: tls-material
    name: spark-tls-secret
    mountPath: /opt/spark/certs
    stringData:
      ca.crt: replace-me

sparkApplications:
  - name: sample-wordcount
    enabled: true
    type: Python
    mode: cluster
    sparkVersion: "3.5.1"
    image: ghcr.io/example/spark-py:3.5.1
    imagePullPolicy: IfNotPresent
    mainApplicationFile: local:///opt/spark/scripts/example_job.py
    arguments:
      - "--message"
      - "hello from spark"
    restartPolicy:
      type: Never
    sharedConfigMapRefs:
      - common-env
    sharedSecretRefs:
      - api-token
    driver:
      cores: 1
      coreLimit: 1200m
      memory: 512m
    executor:
      instances: 1
      cores: 1
      memory: 512m
