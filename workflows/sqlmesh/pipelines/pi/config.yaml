gateways:
  homelab:
    connection:
      type: spark
      config:
        # Spark on Kubernetes configuration
        spark.master: "{{ env_var('SPARK_MASTER', 'k8s://https://kubernetes.default.svc') }}"
        spark.submit.deployMode: "client"
        spark.kubernetes.container.image: "apache/spark:4.1.2-python3"
        spark.kubernetes.namespace: "{{ env_var('SPARK_NAMESPACE', 'data') }}"
        spark.kubernetes.driver.pod.name: "{{ env_var('SPARK_DRIVER_POD_NAME') }}"
        spark.driver.host: "{{ env_var('SPARK_DRIVER_POD_IP') }}"
        spark.driver.bindAddress: "0.0.0.0"
        spark.kubernetes.authenticate.caCertFile: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        spark.kubernetes.authenticate.oauthTokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
        spark.kubernetes.authenticate.executor.serviceAccountName: "{{ env_var('SPARK_EXECUTOR_SERVICE_ACCOUNT', 'datahub-local-core-data-airflow-spark') }}"
        spark.kubernetes.driver.label.app: "sqlmesh-driver"
        spark.kubernetes.executor.label.app: "sqlmesh-executor"

        # Spark resource configuration
        spark.executor.instances: "{{ env_var('SPARK_EXECUTOR_INSTANCES', '2') }}"
        spark.executor.memory: "{{ env_var('SPARK_EXECUTOR_MEMORY', '2G') }}"
        spark.driver.cores: "{{ env_var('SPARK_DRIVER_CORES', '1') }}"
        spark.driver.memory: "{{ env_var('SPARK_DRIVER_MEMORY', '2G') }}"

        # Spark SQL configuration
        spark.sql.shuffle.partitions: "{{ env_var('PI_PARTITIONS', '500') }}"
        spark.sql.session.timeZone: "UTC"

        # S3A / Garage configuration
        spark.hadoop.fs.s3a.endpoint: "{{ env_var('S3_ENDPOINT', 'http://datahub-local-core-data-garage:3900') }}"
        spark.hadoop.fs.s3a.access.key: "{{ env_var('S3_ACCESS_KEY') }}"
        spark.hadoop.fs.s3a.secret.key: "{{ env_var('S3_SECRET_KEY') }}"
        spark.hadoop.fs.s3a.path.style.access: "true"
        spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
        spark.hadoop.fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
        spark.hadoop.fs.s3a.endpoint.region: "homelab"
        spark.hadoop.fs.s3a.region: "homelab"

        # Iceberg REST catalog
        # Set default catalog at session level to avoid "USE CATALOG" SQL (not supported in Spark SQL syntax)
        spark.sql.defaultCatalog: "iceberg"
        spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
        spark.sql.catalog.iceberg: "org.apache.iceberg.spark.SparkCatalog"
        spark.sql.catalog.iceberg.catalog-impl: "org.apache.iceberg.rest.RESTCatalog"
        spark.sql.catalog.iceberg.uri: "{{ env_var('ICEBERG_CATALOG_URI', 'http://datahub-local-core-data-nessie:19120/iceberg/') }}"
        spark.sql.catalog.iceberg.warehouse: "{{ env_var('ICEBERG_WAREHOUSE', 's3://datahub-local-test') }}"
        # Packages: Iceberg runtime (Spark 4 / Scala 2.13) + S3A connector
        spark.jars.packages: "org.apache.iceberg:iceberg-spark-runtime-4.1_2.13:1.11.0,org.apache.hadoop:hadoop-aws:3.4.3,com.amazonaws:aws-java-sdk-bundle:1.12.797"
    state_connection:
      type: postgres
      host: "{{ env_var('SQLMESH_STATE_HOST') }}"
      port: "{{ env_var('SQLMESH_STATE_PORT', '5432') }}"
      database: "{{ env_var('SQLMESH_STATE_DB', 'sqlmesh') }}"
      user: "{{ env_var('SQLMESH_STATE_USER') }}"
      password: "{{ env_var('SQLMESH_STATE_PASSWORD') }}"

{% if env_var('SQLMESH_LOCAL_GATEWAY', 'false') == 'true' %}
  local:
    connection:
      type: spark
      config:
        spark.master: "{{ env_var('SPARK_MASTER', 'local[*]') }}"
        spark.sql.shuffle.partitions: "4"
        spark.sql.warehouse.dir: "{{ env_var('SPARK_WAREHOUSE_DIR', '/tmp/spark-warehouse') }}"
    state_connection:
      type: duckdb
      database: "local.db"
{% endif %}

default_gateway: "{{ 'local' if env_var('SQLMESH_LOCAL_GATEWAY', 'false') == 'true' else 'homelab' }}"

model_defaults:
  dialect: spark

variables:
  partitions: "{{ env_var('PI_PARTITIONS', '500') }}"
  samples_per_partition: "{{ env_var('PI_SAMPLES_PER_PARTITION', '100000') }}"
  random_seed: "{{ env_var('PI_RANDOM_SEED', '7') }}"
