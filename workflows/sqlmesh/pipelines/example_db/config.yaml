gateways:
  homelab:
    connection:
      type: spark
      config:
        # Spark on Kubernetes configuration
        spark.master: "k8s://https://kubernetes.default.svc"
        spark.submit.deployMode: "client"
        spark.kubernetes.container.image: "apache/spark:4.1.2-python3"
        spark.kubernetes.namespace: "{{ env_var('SPARK_NAMESPACE', 'data') }}"
        spark.kubernetes.driver.pod.name: "{{ env_var('SPARK_DRIVER_POD_NAME') }}"
        spark.driver.host: "{{ env_var('SPARK_DRIVER_POD_IP') }}"
        spark.driver.bindAddress: "0.0.0.0"
        spark.kubernetes.authenticate.caCertFile: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        spark.kubernetes.authenticate.oauthTokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
        spark.kubernetes.authenticate.executor.serviceAccountName: "{{ env_var('SPARK_EXECUTOR_SERVICE_ACCOUNT', 'datahub-local-core-data-airflow-spark') }}"
        spark.kubernetes.driver.label.app: "sqlmesh-driver"
        spark.kubernetes.executor.label.app: "sqlmesh-executor"

        # Spark resource configuration
        spark.executor.instances: "{{ env_var('SPARK_EXECUTOR_INSTANCES', '2') }}"
        spark.executor.memory: "{{ env_var('SPARK_EXECUTOR_MEMORY', '2G') }}"
        spark.driver.cores: "{{ env_var('SPARK_DRIVER_CORES', '1') }}"
        spark.driver.memory: "{{ env_var('SPARK_DRIVER_MEMORY', '2G') }}"

        # Spark SQL configuration
        spark.sql.shuffle.partitions: "8"
        spark.sql.session.timeZone: "UTC"

        # Packages: Iceberg runtime (Spark 4 / Scala 2.13) + S3A connector
        spark.jars.packages: "org.apache.iceberg:iceberg-spark-runtime-4.1_2.13:1.11.0,org.apache.hadoop:hadoop-aws:3.5.0,com.amazonaws:aws-java-sdk-bundle:1.12.797"

        # S3A / Garage configuration
        spark.hadoop.fs.s3a.endpoint: "{{ env_var('S3_ENDPOINT', 'http://datahub-local-core-data-garage:3900') }}"
        spark.hadoop.fs.s3a.access.key: "{{ env_var('S3_ACCESS_KEY') }}"
        spark.hadoop.fs.s3a.secret.key: "{{ env_var('S3_SECRET_KEY') }}"
        spark.hadoop.fs.s3a.path.style.access: "true"
        spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
        spark.hadoop.fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
        spark.hadoop.fs.s3a.region: "homelab"

        # Iceberg + Nessie catalogs (medallion architecture)
        spark.sql.defaultCatalog: "nessie_bronze"
        spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"

        # Bronze catalog — raw ingestion and staging
        spark.sql.catalog.nessie_bronze: "org.apache.iceberg.spark.SparkCatalog"
        spark.sql.catalog.nessie_bronze.catalog-impl: "org.apache.iceberg.nessie.NessieCatalog"
        spark.sql.catalog.nessie_bronze.uri: "{{ env_var('NESSIE_URI', 'http://datahub-local-core-data-nessie:19120/api/v2') }}"
        spark.sql.catalog.nessie_bronze.ref: "{{ env_var('NESSIE_REF', 'main') }}"
        spark.sql.catalog.nessie_bronze.warehouse: "s3a://datahub-local-bronze"

        # Silver catalog — cleaned and fully-typed data
        spark.sql.catalog.nessie_silver: "org.apache.iceberg.spark.SparkCatalog"
        spark.sql.catalog.nessie_silver.catalog-impl: "org.apache.iceberg.nessie.NessieCatalog"
        spark.sql.catalog.nessie_silver.uri: "{{ env_var('NESSIE_URI', 'http://datahub-local-core-data-nessie:19120/api/v2') }}"
        spark.sql.catalog.nessie_silver.ref: "{{ env_var('NESSIE_REF', 'main') }}"
        spark.sql.catalog.nessie_silver.warehouse: "s3a://datahub-local-silver"

        # Gold catalog — aggregated, business-ready data
        spark.sql.catalog.nessie_gold: "org.apache.iceberg.spark.SparkCatalog"
        spark.sql.catalog.nessie_gold.catalog-impl: "org.apache.iceberg.nessie.NessieCatalog"
        spark.sql.catalog.nessie_gold.uri: "{{ env_var('NESSIE_URI', 'http://datahub-local-core-data-nessie:19120/api/v2') }}"
        spark.sql.catalog.nessie_gold.ref: "{{ env_var('NESSIE_REF', 'main') }}"
        spark.sql.catalog.nessie_gold.warehouse: "s3a://datahub-local-gold"

        spark.driverEnv.EXAMPLE_DB_URL: "{{ env_var('EXAMPLE_DB_URL', 'jdbc:h2:mem:testdb') }}"
        spark.driverEnv.EXAMPLE_DB_USER: "{{ env_var('EXAMPLE_DB_USER', 'user') }}"
        spark.driverEnv.EXAMPLE_DB_PASSWORD: "{{ env_var('EXAMPLE_DB_PASSWORD', '') }}"
    state_connection:
      type: postgres
      host: "{{ env_var('SQLMESH_STATE_HOST') }}"
      port: "{{ env_var('SQLMESH_STATE_PORT', '5432') }}"
      database: "{{ env_var('SQLMESH_STATE_DB', 'sqlmesh') }}"
      user: "{{ env_var('SQLMESH_STATE_USER') }}"
      password: "{{ env_var('SQLMESH_STATE_PASSWORD') }}"

  local:
    connection:
      type: spark
      config:
        spark.master: "{{ env_var('SPARK_MASTER', 'local[*]') }}"
        spark.sql.shuffle.partitions: "4"
        spark.sql.warehouse.dir: "{{ env_var('SPARK_WAREHOUSE_DIR', '/tmp/spark-warehouse') }}"

        # Packages
        spark.jars.packages: "org.apache.iceberg:iceberg-spark-runtime-4.1_2.13:1.11.0,com.h2database:h2:2.2.224"

        spark.driverEnv.EXAMPLE_DB_URL: "{{ env_var('EXAMPLE_DB_URL') }}"
        spark.driverEnv.EXAMPLE_DB_USER: "{{ env_var('EXAMPLE_DB_USER') }}"
        spark.driverEnv.EXAMPLE_DB_PASSWORD: "{{ env_var('EXAMPLE_DB_PASSWORD') }}"
    state_connection:
      type: duckdb
      database: "local.db"

default_gateway: local

model_defaults:
  dialect: spark
  catalog: nessie_bronze
