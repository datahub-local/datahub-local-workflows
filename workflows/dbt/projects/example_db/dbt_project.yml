name: "example_db"
version: "1.0.0"
config-version: 2

profile: "example_db"

model-paths: ["models"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Each medallion layer is a real catalog (Trino: Iceberg over Apache Polaris;
# DuckDB: an attached database). Models set +database (catalog) and +schema (namespace),
# yielding `<catalog>.example_db.<table>`. generate_schema_name (macros/) keeps the schema
# verbatim instead of prefixing it with the target schema.
models:
  example_db:
    +materialized: table
    +schema: example_db
    bronze:
      +database: bronze
    silver:
      +database: silver
    gold:
      +database: gold
