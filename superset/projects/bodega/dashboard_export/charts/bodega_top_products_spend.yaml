slice_name: Bodega - Top products by total spend
description: Top 10 in the selected date range. To drill into a product, click its
  name in the table on the right (bar clicks are disabled — horizontal bars emit
  the metric value as cross-filter in Superset 6.1.0).
viz_type: echarts_timeseries_bar
params:
  datasource: 0__table
  viz_type: echarts_timeseries_bar
  x_axis: description_clean
  metrics:
  - expressionType: SIMPLE
    aggregate: SUM
    column:
      column_name: total_amount
      type: DOUBLE
    hasCustomLabel: true
    label: Total spent
    optionName: metric_bodega_top_spend
  orientation: horizontal
  x_axis_sort: Total spent
  x_axis_sort_asc: false
  show_legend: false
  rich_tooltip: true
  y_axis_format: SMART_NUMBER
  currency_format:
    symbol: EUR
    symbolPosition: prefix
  row_limit: 10
  time_range: No filter
query_context: null
cache_timeout: null
