slice_name: Bodega - Staple price index
description: Weekly average unit price indexed to 100 at each product's first observed week. Top 5 most-purchased staples.
viz_type: echarts_timeseries_line
params:
  datasource: 0__table
  viz_type: echarts_timeseries_line
  x_axis: week_start
  time_grain_sqla: P1W
  metrics:
  - expressionType: SIMPLE
    aggregate: AVG
    column:
      column_name: price_index
      type: DOUBLE
    label: Price index
    optionName: metric_bodega_price_idx
  groupby:
  - description_clean
  series_limit: 5
  series_limit_metric:
    expressionType: SIMPLE
    aggregate: SUM
    column:
      column_name: purchase_count
      type: BIGINT
    label: Purchases
    optionName: metric_bodega_price_idx_limit
  markerEnabled: false
  show_legend: true
  rich_tooltip: true
  y_axis_format: ',.0f'
  time_range: No filter
query_context: null
cache_timeout: null
