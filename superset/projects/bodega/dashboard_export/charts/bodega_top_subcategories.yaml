slice_name: Bodega - Top subcategories
description: Spend and item count by subcategory.
viz_type: table
params:
  datasource: 0__table
  viz_type: table
  query_mode: aggregate
  groupby:
  - subcategory
  - category
  metrics:
  - expressionType: SIMPLE
    aggregate: SUM
    column:
      column_name: total_spent
      type: DOUBLE
    label: Spend
    optionName: metric_bodega_subcat_spend
  - expressionType: SIMPLE
    aggregate: SUM
    column:
      column_name: item_count
      type: BIGINT
    label: Items
    optionName: metric_bodega_subcat_items
  timeseries_limit_metric:
    expressionType: SIMPLE
    aggregate: SUM
    column:
      column_name: total_spent
      type: DOUBLE
    label: Spend
    optionName: metric_bodega_subcat_order
  order_desc: true
  row_limit: 500
  server_page_length: 15
  table_timestamp_format: smart_date
  time_range: No filter
query_context: null
cache_timeout: null
