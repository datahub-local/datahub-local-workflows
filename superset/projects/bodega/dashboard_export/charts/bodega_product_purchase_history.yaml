slice_name: Bodega - Purchase history
description: Every purchase of the selected product, newest first — quantity, unit
  price (€/kg or €/unit) and total paid. Shows all products until one is clicked
  in the frequent-products table above. Cell clicks here emit no cross-filter.
viz_type: table
params:
  datasource: 0__table
  viz_type: table
  query_mode: raw
  all_columns:
  - invoice_date
  - description_clean
  - supermarket
  - quantity
  - unit_price
  - price_unit
  - total_amount
  order_by_cols:
  - '["invoice_date", false]'
  row_limit: 5000
  server_page_length: 15
  column_config:
    quantity:
      d3NumberFormat: ',.3~f'
    unit_price:
      d3NumberFormat: ',.2f'
    total_amount:
      d3NumberFormat: ',.2f'
  table_timestamp_format: smart_date
  time_range: No filter
query_context: null
cache_timeout: null
