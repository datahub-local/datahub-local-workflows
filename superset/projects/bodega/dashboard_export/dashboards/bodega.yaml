metadata:
  color_scheme: supersetColors
  refresh_frequency: 0
  expanded_slices: {}
  label_colors: {}
  timed_refresh_immune_slices: []
  cross_filters_enabled: true
  native_filter_configuration:
  - id: NATIVE_FILTER-bodega-time
    name: Date range
    filterType: filter_time
    targets: []
    defaultDataMask:
      extraFormData:
        time_range: Last year
      filterState:
        value: Last year
    controlValues: {}
    cascadeParentIds: []
    scope:
      rootPath:
      - ROOT_ID
      excluded: []
    type: NATIVE_FILTER
    description: ''
  - id: NATIVE_FILTER-bodega-supermarket
    name: Supermarket
    filterType: filter_select
    targets:
    - column:
        name: supermarket
      datasetUuid: 67f9204f-2050-4498-8728-2ce7648c3ed4
    defaultDataMask:
      extraFormData: {}
      filterState: {}
    controlValues:
      multiSelect: true
      enableEmptyFilter: false
      defaultToFirstItem: false
      searchAllOptions: false
      inverseSelection: false
    cascadeParentIds: []
    scope:
      rootPath:
      - ROOT_ID
      excluded: []
    type: NATIVE_FILTER
    description: ''
  - id: NATIVE_FILTER-bodega-category
    name: Category
    filterType: filter_select
    targets:
    - column:
        name: category
      datasetUuid: 011087c7-60b6-4a59-8205-bd8a074f1e85
    defaultDataMask:
      extraFormData: {}
      filterState: {}
    controlValues:
      multiSelect: true
      enableEmptyFilter: false
      defaultToFirstItem: false
      searchAllOptions: false
      inverseSelection: false
    cascadeParentIds: []
    scope:
      rootPath:
      - ROOT_ID
      excluded: []
    type: NATIVE_FILTER
    description: ''
  - id: NATIVE_FILTER-bodega-invoice
    name: Invoice
    filterType: filter_select
    targets:
    - column:
        name: invoice_label
      datasetUuid: 763787a8-8731-4aec-b90d-6abfd983e72f
    defaultDataMask:
      extraFormData: {}
      filterState: {}
    controlValues:
      multiSelect: false
      enableEmptyFilter: false
      defaultToFirstItem: false
      searchAllOptions: true
      inverseSelection: false
    cascadeParentIds: []
    scope:
      rootPath:
      - ROOT_ID
      excluded: []
    type: NATIVE_FILTER
    description: Only affects the invoice datasets (the only ones with invoice_number);
      scope must stay ROOT_ID because hand-written exports carry no chartsInScope
      and Superset ignores rootPath/excluded without it.
version: 1.0.0
