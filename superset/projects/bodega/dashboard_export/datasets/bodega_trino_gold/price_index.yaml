catalog: null
sql: "SELECT\n    week_start,\n    description_clean,\n    supermarket,\n    category,\n    purchase_count,\n    avg_unit_price\
  \ / first_value(avg_unit_price) OVER (\n        PARTITION BY description_clean, supermarket\n        ORDER BY week_start\n\
  \    ) * 100 AS price_index\nFROM bodega.price_trends"
