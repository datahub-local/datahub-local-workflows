table_name: product_purchases
main_dttm_col: invoice_date
description: One row per purchased line item (silver layer), for the Products tab
  ranking and drill-down. unit_price is €/kg for weighed lines and €/unit otherwise.
default_endpoint: null
offset: 0
cache_timeout: null
schema: null
catalog: null
sql: |-
  SELECT
      i.invoice_number,
      i.invoice_date,
      i.description_clean,
      COALESCE(p.category, 'OTHER') AS category,
      p.subcategory,
      i.supermarket,
      i.quantity,
      i.unit_price,
      i.total_amount,
      COALESCE(p.is_weighted, false) AS is_weighted,
      CASE WHEN COALESCE(p.is_weighted, false) THEN '€/kg' ELSE '€/unit' END
          AS price_unit
  FROM silver.bodega.invoice_items i
  LEFT JOIN (
      -- products is merge-by-key in dlt but the Iceberg filesystem destination
      -- falls back to append, so dedupe to the latest categorisation per key
      SELECT
          description_clean,
          supermarket,
          max_by(category, categorized_at)    AS category,
          max_by(subcategory, categorized_at) AS subcategory,
          max_by(is_weighted, categorized_at) AS is_weighted
      FROM silver.bodega.products
      GROUP BY description_clean, supermarket
  ) p
      ON  i.description_clean = p.description_clean
      AND i.supermarket       = p.supermarket
