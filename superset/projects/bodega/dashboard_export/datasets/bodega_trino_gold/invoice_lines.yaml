table_name: invoice_lines
main_dttm_col: invoice_date
description: Invoice line items (silver layer) joined to the LLM-categorised product dimension.
default_endpoint: null
offset: 0
cache_timeout: null
schema: null
catalog: null
sql: |-
  -- invoice_label must stay byte-identical to the one in invoice_list: it is the
  -- cross-filter / Invoice-filter key linking the list to the drill-down charts.
  SELECT
      i.invoice_number,
      date_format(inv.invoice_datetime, '%Y-%m-%d %H:%i') || ' ' || inv.supermarket
          || ' · ' || i.invoice_number
          AS invoice_label,
      i.invoice_date,
      i.item_position,
      i.description_clean,
      COALESCE(p.category, 'OTHER') AS category,
      p.subcategory,
      i.quantity,
      i.unit,
      i.unit_price,
      i.total_amount,
      i.supermarket
  FROM silver.bodega.invoice_items i
  JOIN silver.bodega.invoices inv
      ON i.invoice_number = inv.invoice_number
  LEFT JOIN (
      -- products is merge-by-key in dlt but the Iceberg filesystem destination
      -- falls back to append, so dedupe to the latest categorisation per key
      SELECT
          description_clean,
          supermarket,
          max_by(category, categorized_at)    AS category,
          max_by(subcategory, categorized_at) AS subcategory
      FROM silver.bodega.products
      GROUP BY description_clean, supermarket
  ) p
      ON  i.description_clean = p.description_clean
      AND i.supermarket       = p.supermarket
