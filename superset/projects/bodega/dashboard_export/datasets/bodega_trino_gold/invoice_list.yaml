table_name: invoice_list
main_dttm_col: invoice_date
description: One row per invoice (silver layer), for browsing and the Invoice native filter.
default_endpoint: null
offset: 0
cache_timeout: null
schema: null
catalog: null
sql: |-
  -- invoice_label must stay byte-identical to the one in invoice_lines: it is the
  -- cross-filter / Invoice-filter key linking the list to the drill-down charts.
  -- Kept short and human-readable (no visible invoice id); datetime-to-the-minute
  -- plus supermarket is unique in practice for household groceries.
  SELECT
      i.invoice_number,
      date_format(i.invoice_datetime, '%Y-%m-%d %H:%i') || ' ' || i.supermarket
          AS invoice_label,
      i.invoice_datetime,
      i.invoice_date,
      i.supermarket,
      i.store_name,
      s.address AS store_address,
      s.phone AS store_phone,
      i.payment_method,
      i.card_type,
      i.card_number_masked,
      coalesce(i.payment_method, '-')
          || coalesce(' · ' || i.card_type
              || coalesce(' ' || i.card_number_masked, ''), '')
          AS payment_detail,
      i.item_count AS invoice_items,
      round(i.total_amount, 2) AS invoice_total,
      round(i.total_tax_amount, 2) AS invoice_tax
  FROM silver.bodega.invoices i
  LEFT JOIN silver.bodega.stores s
      ON i.store_vat_id = s.store_id
