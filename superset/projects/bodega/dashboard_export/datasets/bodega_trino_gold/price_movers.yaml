table_name: price_movers
main_dttm_col: last_week
description: First vs. last observed average unit price per repeat product, with percentage change.
default_endpoint: null
offset: 0
cache_timeout: null
schema: null
catalog: null
sql: "WITH bounds AS (\n    SELECT\n        description_clean,\n        supermarket,\n        category,\n        min_by(avg_unit_price,\
  \ week_start) AS first_price,\n        max_by(avg_unit_price, week_start) AS last_price,\n        MIN(week_start)      \
  \              AS first_week,\n        MAX(week_start)                    AS last_week,\n        SUM(purchase_count)   \
  \             AS purchases\n    FROM bodega.price_trends\n    GROUP BY description_clean, supermarket, category\n)\nSELECT\n\
  \    description_clean,\n    supermarket,\n    category,\n    purchases,\n    first_week,\n    last_week,\n    first_price,\n\
  \    last_price,\n    (last_price - first_price) / first_price * 100 AS change_pct\nFROM bounds\nWHERE first_week < last_week"
